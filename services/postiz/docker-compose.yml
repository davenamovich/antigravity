version: "3.8"

# ── Postiz v2.11.3 — pinned pre-Temporal ──────────────────────
# Deploy this on Railway using the template or manual docker deploy.
# Pin to v2.11.3 — last version before Temporal dependency.

services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:v2.11.3
    container_name: postiz
    restart: always
    ports:
      - "5000:5000"
    environment:
      # ── REQUIRED: change to your actual domain ──────────────
      MAIN_APP_URL: "${POSTIZ_MAIN_APP_URL:-http://localhost:5000}"
      FRONTEND_URL: "${POSTIZ_FRONTEND_URL:-http://localhost:5000}"

      # ── Auth ────────────────────────────────────────────────
      JWT_SECRET: "${POSTIZ_JWT_SECRET}"
      # Generate: openssl rand -base64 32

      # ── Database ─────────────────────────────────────────────
      DATABASE_URL: "${DATABASE_URL}"

      # ── Redis ────────────────────────────────────────────────
      REDIS_URL: "${REDIS_URL}"

      # ── Storage (local for dev, swap to Cloudflare R2 in prod)
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"

      # ── Registration: set true AFTER creating first account ──
      DISABLE_REGISTRATION: "${DISABLE_REGISTRATION:-false}"

      # ── Optional AI features ─────────────────────────────────
      # OPENAI_API_KEY: "${OPENAI_API_KEY}"

    volumes:
      - postiz_uploads:/uploads
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postiz_db
    restart: always
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postiz_local}"
      POSTGRES_DB: postiz
    volumes:
      - postiz_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: postiz_redis
    restart: always
    volumes:
      - postiz_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postiz_uploads:
  postiz_db:
  postiz_redis:
